<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Astronomy Picture of the Day">
    <title>APOD</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <button id="see-saved"><img src="./media/save-logo.webp" class="save-logo"></button>
        <h1>Astronomy Picture of The Day</h1>
        <section id="pics-calendar">
            <img id="picture-of-the-day">
            <div id ="info">
                <p id="info-paragraph">Loading</p>
                <a target="_blank">Watch here!</a>
            </div>
            <div id="controls">
                <button id="left">&lt;</button>
                <p id="date"></p>
                <button id="right">&gt;</button>
            </div>
        </section>
            <button id="see-more-btn">See More</button>
        <section id="pics-container" class="closed">
            <img class="">

        </section>
        <dialog id="saved-imgs-container">
            <button id="close-saved-imgs">X</button>
            <div id="saved-imgs"></div>
        </dialog>
        <dialog id="full-screen">
            <button id="save-pic"><img src="./media/save-logo.webp" class="save-logo"></button>
            <button id="close-full-screen">X</button>
            <img id="hd-image">
            <h2 id="img-title"></h2>
            <p id="explanation">
        </dialog>
    </main>

    <footer>
        <p>Background image by <a target="_blank" href="https://freerangestock.com/photographer/Alexandre_Godreau/7698">Alexandre_Godreau</a> from <a target="_blank" href="https://freerangestock.com">Freerange Stock</a></p>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>
